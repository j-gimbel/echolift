<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifter Replay</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .latest-box { border: 2px solid #00ff00; padding: 15px; border-radius: 15px; margin-bottom: 30px; }
        video { width: 100%; max-width: 600px; border-radius: 10px; background: #111; }
        .btn { display: block; background: #007bff; color: white; padding: 15px; margin: 10px auto; 
               text-decoration: none; border-radius: 8px; width: 80%; font-weight: bold; }
        .status-polling { font-size: 0.7em; color: #555; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🏋️ Deine Lifts</h1>

    <div id="content-area">
        {% if latest %}
        <div class="latest-box">
            <h3>Letzter Versuch (bereit)</h3>
            <video id="main-video" controls autoplay muted>
                <source src="/static/videos/{{ latest }}" type="video/mp4">
            </video>
            <a href="/static/videos/{{ latest }}" class="btn" download>DOWNLOAD CLIP</a>
        </div>
        {% else %}
            <p>Noch keine Aufnahmen vorhanden. Starte einen Lift!</p>
        {% endif %}
    </div>

    <div class="status-polling">Station aktiv - Automatische Aktualisierung an</div>

    <script>
        let currentLatest = "{{ latest }}";

        async function checkNewVideo() {
            try {
                // Wir fragen einen speziellen API-Endpunkt nach dem neuesten Dateinamen
                const response = await fetch('/api/latest');
                const data = await response.json();
                
                if (data.latest && data.latest !== currentLatest) {
                    console.log("Neues Video gefunden: " + data.latest);
                    // Seite neu laden, um das neue Video anzuzeigen
                    location.reload();
                }
            } catch (error) {
                console.log("Server noch nicht bereit...");
            }
        }

        // Alle 2 Sekunden prüfen
        setInterval(checkNewVideo, 2000);
    </script>
</body>
</html>
